steps:
  # ── Build Docker image ──────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/the-book-786/the-book-api:$COMMIT_SHA
      - ./backend

  # ── Push to Container Registry ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/the-book-786/the-book-api:$COMMIT_SHA

  # ── Deploy to Cloud Run ────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - the-book-api
      - --image=gcr.io/the-book-786/the-book-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=the-book-api@the-book-786.iam.gserviceaccount.com

  # ── Build React frontend ───────────────────────────────────────────────────
  - name: 'node:20'
    entrypoint: bash
    args:
      - -c
      - |
        cd frontend
        npm install --legacy-peer-deps
        npm run build

  # ── Deploy to Firebase Hosting ────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project the-book-786 --non-interactive

images:
  - gcr.io/the-book-786/the-book-api:$COMMIT_SHA
